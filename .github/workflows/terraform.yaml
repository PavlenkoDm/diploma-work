name: Terraform Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "terraform/infrastructure/**"

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials file
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << EOF
          [default]
          aws_access_key_id=${{ secrets.TF_ACCESS_KEY }}
          aws_secret_access_key=${{ secrets.TF_SECRET_KEY }}
          EOF

      # - name: Terraform Init
      #   working-directory: terraform/infrastructure
      #   run: terraform init

      - name: Terraform Init
        working-directory: terraform/infrastructure
        run: terraform init -reconfigure 2>&1

      - name: Debug state
        working-directory: terraform/infrastructure
        run: terraform state list

      - name: Debug terraform init
        working-directory: terraform/infrastructure
        run: |
          echo "Home dir: $HOME"
          echo "AWS credentials file:"
          cat $HOME/.aws/credentials
          echo "---"
          terraform state list

      - name: Terraform Plan
        working-directory: terraform/infrastructure
        env:
          TF_VAR_token: ${{ secrets.YC_TOKEN }}
          TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
          TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_bucket_name: ${{ secrets.TF_BUCKET_NAME }}
          TF_VAR_S3_access_key: ${{ secrets.TF_ACCESS_KEY }}
          TF_VAR_S3_secret_key: ${{ secrets.TF_SECRET_KEY }}
          TF_VAR_service_account_id: ${{ secrets.TF_SA_ID }}
        run: terraform plan

      - name: Terraform Apply
        working-directory: terraform/infrastructure
        env:
          TF_VAR_token: ${{ secrets.YC_TOKEN }}
          TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
          TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_bucket_name: ${{ secrets.TF_BUCKET_NAME }}
          TF_VAR_S3_access_key: ${{ secrets.TF_ACCESS_KEY }}
          TF_VAR_S3_secret_key: ${{ secrets.TF_SECRET_KEY }}
          TF_VAR_service_account_id: ${{ secrets.TF_SA_ID }}
        run: terraform apply -auto-approve
